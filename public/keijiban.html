<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J24024の掲示板</title>
  <style>
    :root {
      --bg: #04060a;
      --panel-bg: rgba(4, 6, 10, 0.6);
      --muted: #9fb4c9;
      --neon: #00f0ff;
      --neon-2: #8a2be2;
      --neon-accent: #ff2d95;
      --ink-light: #e6f7ff;
      --glass-border: rgba(255,255,255,0.06);
      --neon-rgb: 0,240,255;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(138,43,226,0.06), transparent 12%),
        radial-gradient(1000px 500px at 90% 80%, rgba(255,45,149,0.06), transparent 12%),
        linear-gradient(180deg, var(--bg) 0%, #071124 100%);
      background-attachment: fixed;
      color: var(--ink-light);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app { width: min(100%, 1040px); margin: 0 auto; padding: 48px 20px 64px; }

    .header { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:28px; }

    .title {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
      color: var(--neon);
      text-shadow:
        0 0 8px rgba(var(--neon-rgb),0.9),
        0 0 28px rgba(138,43,226,0.18),
        0 4px 24px rgba(0,0,0,0.6);
      letter-spacing: 0.6px;
    }

    .subtitle { margin: 12px 0 0; color: var(--muted); line-height:1.6; }

    .refresh {
      width:48px; height:48px; border-radius:10px; background:transparent;
      border:1px solid var(--glass-border); color:var(--ink-light);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 18px rgba(var(--neon-rgb),0.06);
      backdrop-filter: blur(8px);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .refresh:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.7), 0 0 28px rgba(var(--neon-rgb),0.25); }

    .layout { display:grid; grid-template-columns: minmax(280px,360px) minmax(0,1fr); gap:20px; align-items:start; }

    .panel {
      border-radius:12px; background: var(--panel-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 48px rgba(2,6,23,0.6), 0 0 40px rgba(var(--neon-rgb),0.03);
      backdrop-filter: blur(8px) saturate(120%);
    }

    .form { position: sticky; top:20px; padding:20px; }

    .field { display: grid; gap:8px; margin-bottom:16px; }

    label { color: var(--ink-light); font-size:0.92rem; font-weight:700; }

    input, textarea {
      width:100%; border-radius:10px; padding:12px 14px; color:var(--ink-light);
      background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04);
      outline:none; transition: box-shadow .16s ease, border-color .16s ease, background .16s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    textarea { min-height:160px; resize:vertical; line-height:1.7; }

    input:focus, textarea:focus {
      border-color: rgba(var(--neon-rgb),0.9);
      box-shadow: 0 0 18px rgba(var(--neon-rgb),0.18), 0 6px 24px rgba(0,0,0,0.6) inset;
      background: rgba(255,255,255,0.02);
    }

    .submit {
      display:inline-flex; align-items:center; justify-content:center; width:100%; min-height:46px; border-radius:10px;
      color:#06121a; font-weight:800;
      background: linear-gradient(90deg, var(--neon), var(--neon-2));
      box-shadow: 0 6px 30px rgba(var(--neon-rgb),0.22), 0 10px 30px rgba(0,0,0,0.6);
      transition: transform .14s ease, filter .14s ease;
    }

    .submit:hover { transform: translateY(-2px); filter: saturate(1.08); }
    .submit:disabled { cursor: wait; opacity:0.7; transform:none; }

    .status { min-height:24px; margin:14px 0 0; color:var(--muted); font-size:0.92rem; line-height:1.5; }
    .status.error { color:#ff7b7b; }

    .posts { display:grid; gap:16px; }

    .post {
      position:relative; padding:18px; border-radius:12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 36px rgba(var(--neon-rgb),0.04);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .post:hover { transform: translateY(-3px); box-shadow: 0 18px 48px rgba(0,0,0,0.75), 0 0 56px rgba(var(--neon-rgb),0.12); border-color: rgba(var(--neon-rgb),0.18); }

    .post-header { display:flex; justify-content:space-between; gap:12px; margin-bottom:10px; }

    .name { color: var(--neon-accent); font-weight:800; overflow-wrap:anywhere; text-shadow: 0 0 8px rgba(255,45,149,0.12); }

    .date { color: #9fb4c9; font-size:0.86rem; }

    .message { margin:0; color:var(--ink-light); line-height:1.8; white-space:pre-wrap; overflow-wrap:anywhere; }

    .post-actions { display:flex; align-items:center; gap:10px; margin-top:14px; }

    .convert {
      display:inline-flex; align-items:center; justify-content:center; min-height:36px; padding:0 14px; border-radius:10px;
      color:var(--ink-light); background:transparent; border:1px solid rgba(var(--neon-rgb),0.18); font-weight:800;
      box-shadow: 0 6px 18px rgba(var(--neon-rgb),0.06); transition: transform .14s ease, box-shadow .14s ease;
    }

    .convert:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(var(--neon-rgb),0.16); }
    .convert:disabled { cursor: wait; opacity:0.7; }

    .converted { display:none; margin:14px 0 0; padding:12px 14px; border-radius:10px; color:var(--ink-light);
      background: linear-gradient(180deg, rgba(0,240,255,0.04), rgba(138,43,226,0.03)); border-left:4px solid var(--neon-2);
    }

    .converted.show { display:block; }
    .converted.error { border-left-color:#ff6b6b; color:#ffdede; background: rgba(255,100,100,0.03); }

    .empty { padding:36px 20px; border:1px dashed rgba(255,255,255,0.04); border-radius:12px; color:var(--muted); text-align:center; }

    @media (max-width:760px) {
      .app { padding-top:28px; }
      .header, .post-header { align-items:flex-start; }
      .layout { grid-template-columns: 1fr; }
      .form { position: static; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1 class="title">J24024の掲示板</h1>
        <p class="subtitle">Google Apps Script とスプレッドシートに保存するシンプルな投稿欄です。</p>
      </div>
      <button class="refresh" type="button" id="refreshButton" aria-label="再読み込み" title="再読み込み">↻</button>
    </header>

    <div class="layout">
      <form class="panel form" id="postForm">
        <div class="field">
          <label for="name">名前</label>
          <input id="name" name="name" type="text" maxlength="24" placeholder="匿名">
        </div>
        <div class="field">
          <label for="message">本文</label>
          <textarea id="message" name="message" maxlength="500" required placeholder="投稿内容を入力"></textarea>
        </div>
        <button class="submit" type="submit" id="submitButton">投稿する</button>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <section class="posts" id="posts" aria-live="polite"></section>
    </div>
  </main>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwqHoi07hyZoc2Tu0Est6cU1WmBDTmniO-vUB8blCDJquYdeu_sVqizKiX3kxk1xTWA/exec';
    

    const form = document.querySelector('#postForm');
    const nameInput = document.querySelector('#name');
    const messageInput = document.querySelector('#message');
    const postsElement = document.querySelector('#posts');
    const statusElement = document.querySelector('#status');
    const submitButton = document.querySelector('#submitButton');
    const refreshButton = document.querySelector('#refreshButton');

    const request = async (params) => {
      const url = new URL(GAS_ENDPOINT);
      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });
      url.searchParams.set('_', Date.now().toString());

      const response = await fetch(url.toString(), { method: 'GET' });

      if (!response.ok) {
        throw new Error('通信に失敗しました。');
      }

      const data = await response.json();

      if (!data.ok) {
        throw new Error(data.message || '処理に失敗しました。');
      }

      return data;
    };

    const setStatus = (message, isError = false) => {
      statusElement.textContent = message;
      statusElement.classList.toggle('error', isError);
    };

    const renderPosts = (posts) => {
      postsElement.replaceChildren();

      if (!posts.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'まだ投稿はありません。';
        postsElement.append(empty);
        return;
      }

      posts.forEach((post) => {
        const article = document.createElement('article');
        article.className = 'post';

        const header = document.createElement('div');
        header.className = 'post-header';

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = post.name || '匿名';

        const date = document.createElement('time');
        date.className = 'date';
        date.textContent = post.createdAt || '';

        const message = document.createElement('p');
        message.className = 'message';
        message.textContent = post.message || '';

        const actions = document.createElement('div');
        actions.className = 'post-actions';

        const convertButton = document.createElement('button');
        convertButton.className = 'convert';
        convertButton.type = 'button';
        convertButton.textContent = '変換';
        convertButton.dataset.postId = post.id || '';

        const converted = document.createElement('p');
        converted.className = 'converted';
        converted.setAttribute('aria-live', 'polite');

        actions.append(convertButton);
        header.append(name, date);
        article.append(header, message, actions, converted);
        postsElement.append(article);
      });
    };

    const convertPost = async (button) => {
      const postId = button.dataset.postId;
      const article = button.closest('.post');
      const converted = article.querySelector('.converted');

      if (!postId) {
        converted.textContent = '投稿IDが取得できませんでした。';
        converted.classList.add('show', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = '変換中...';
      converted.textContent = 'やさしい言葉に変換しています...';
      converted.classList.remove('error');
      converted.classList.add('show');

      try {
        const data = await request({ mode: 'convert_message', id: postId });
        converted.textContent = data.convertedMessage || '変換結果が空でした。';
      } catch (error) {
        converted.textContent = error.message;
        converted.classList.add('error');
      } finally {
        button.disabled = false;
        button.textContent = '変換';
      }
    };

    const loadPosts = async () => {
      setStatus('読み込み中...');

      try {
        const data = await request({ mode: 'list_view' });
        renderPosts(data.posts || []);
        setStatus('');
      } catch (error) {
        renderPosts([]);
        setStatus(error.message, true);
      }
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const message = messageInput.value.trim();

      if (!message) {
        setStatus('本文を入力してください。', true);
        messageInput.focus();
        return;
      }

      submitButton.disabled = true;
      setStatus('投稿中...');

      try {
        await request({ mode: 'add_item', name, message });
        messageInput.value = '';
        setStatus('投稿しました。');
        await loadPosts();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        submitButton.disabled = false;
      }
    });

    refreshButton.addEventListener('click', loadPosts);
    postsElement.addEventListener('click', (event) => {
      const button = event.target.closest('.convert');

      if (button) {
        convertPost(button);
      }
    });
    loadPosts();
  </script>
</body>
</html>
