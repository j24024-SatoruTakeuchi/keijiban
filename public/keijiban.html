<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掲示板</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #152033;
      background: #f7f9fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.12), transparent 32rem),
        linear-gradient(180deg, #ffffff 0%, #f4f7fb 100%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 40px 20px 56px;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
    }

    .subtitle {
      margin: 12px 0 0;
      color: #5c6b80;
      line-height: 1.7;
    }

    .refresh {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border: 1px solid #d7e0ec;
      border-radius: 8px;
      color: #152033;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(21, 32, 51, 0.08);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid #dce4ef;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 48px rgba(21, 32, 51, 0.08);
    }

    .form {
      position: sticky;
      top: 20px;
      padding: 20px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      color: #304057;
      font-size: 0.92rem;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #cfd8e6;
      border-radius: 8px;
      padding: 12px 14px;
      color: #152033;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.7;
    }

    input:focus,
    textarea:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    .submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      border-radius: 8px;
      color: #ffffff;
      background: #0f766e;
      font-weight: 800;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .submit:hover {
      background: #115e59;
      transform: translateY(-1px);
    }

    .submit:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .status {
      min-height: 24px;
      margin: 14px 0 0;
      color: #5c6b80;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .status.error {
      color: #b42318;
    }

    .posts {
      display: grid;
      gap: 14px;
    }

    .post {
      padding: 18px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(21, 32, 51, 0.06);
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .name {
      color: #0f766e;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .date {
      flex: 0 0 auto;
      color: #7a8798;
      font-size: 0.86rem;
    }

    .message {
      margin: 0;
      color: #26364d;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 36px 20px;
      border: 1px dashed #c7d2e1;
      border-radius: 8px;
      color: #6a788b;
      background: rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    @media (max-width: 760px) {
      .app {
        padding-top: 28px;
      }

      .header,
      .post-header {
        align-items: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .form {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1 class="title">掲示板</h1>
        <p class="subtitle">Google Apps Script とスプレッドシートに保存するシンプルな投稿欄です。</p>
      </div>
      <button class="refresh" type="button" id="refreshButton" aria-label="再読み込み" title="再読み込み">↻</button>
    </header>

    <div class="layout">
      <form class="panel form" id="postForm">
        <div class="field">
          <label for="name">名前</label>
          <input id="name" name="name" type="text" maxlength="24" placeholder="匿名">
        </div>
        <div class="field">
          <label for="message">本文</label>
          <textarea id="message" name="message" maxlength="500" required placeholder="投稿内容を入力"></textarea>
        </div>
        <button class="submit" type="submit" id="submitButton">投稿する</button>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <section class="posts" id="posts" aria-live="polite"></section>
    </div>
  </main>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwqHoi07hyZoc2Tu0Est6cU1WmBDTmniO-vUB8blCDJquYdeu_sVqizKiX3kxk1xTWA/exec';
    

    const form = document.querySelector('#postForm');
    const nameInput = document.querySelector('#name');
    const messageInput = document.querySelector('#message');
    const postsElement = document.querySelector('#posts');
    const statusElement = document.querySelector('#status');
    const submitButton = document.querySelector('#submitButton');
    const refreshButton = document.querySelector('#refreshButton');

    const request = async (params) => {
      const url = new URL(GAS_ENDPOINT);
      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });
      url.searchParams.set('_', Date.now().toString());

      const response = await fetch(url.toString(), { method: 'GET' });

      if (!response.ok) {
        throw new Error('通信に失敗しました。');
      }

      const data = await response.json();

      if (!data.ok) {
        throw new Error(data.message || '処理に失敗しました。');
      }

      return data;
    };

    const setStatus = (message, isError = false) => {
      statusElement.textContent = message;
      statusElement.classList.toggle('error', isError);
    };

    const renderPosts = (posts) => {
      postsElement.replaceChildren();

      if (!posts.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'まだ投稿はありません。';
        postsElement.append(empty);
        return;
      }

      posts.forEach((post) => {
        const article = document.createElement('article');
        article.className = 'post';

        const header = document.createElement('div');
        header.className = 'post-header';

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = post.name || '匿名';

        const date = document.createElement('time');
        date.className = 'date';
        date.textContent = post.createdAt || '';

        const message = document.createElement('p');
        message.className = 'message';
        message.textContent = post.message || '';

        header.append(name, date);
        article.append(header, message);
        postsElement.append(article);
      });
    };

    const loadPosts = async () => {
      setStatus('読み込み中...');

      try {
        const data = await request({ mode: 'list_view' });
        renderPosts(data.posts || []);
        setStatus('');
      } catch (error) {
        renderPosts([]);
        setStatus(error.message, true);
      }
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const message = messageInput.value.trim();

      if (!message) {
        setStatus('本文を入力してください。', true);
        messageInput.focus();
        return;
      }

      submitButton.disabled = true;
      setStatus('投稿中...');

      try {
        await request({ mode: 'add_item', name, message });
        messageInput.value = '';
        setStatus('投稿しました。');
        await loadPosts();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        submitButton.disabled = false;
      }
    });

    refreshButton.addEventListener('click', loadPosts);
    loadPosts();
  </script>
</body>
</html>
