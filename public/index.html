<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./keijiban.html">
  <title>J24024の掲示板へ移動中</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #152033;
      background: #f7f9fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f4f7fb 100%);
    }

    main {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(21, 32, 51, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 20px;
      color: #5c6b80;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      color: #ffffff;
      background: #0f766e;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>J24024の掲示板へ移動中</h1>
    <p>自動で移動しない場合は、下のボタンから開いてください。</p>
    <a href="./keijiban.html">J24024の掲示板を開く</a>
  </main>
</body>
</html>
